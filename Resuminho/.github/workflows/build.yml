# Pipeline CI/CD para o Resuminho
# Corre automaticamente em cada push para main ou feature/*

name: Resuminho CI/CD

on:
  push:
    branches:
      - main
      - 'feature/*'
      - develop
  pull_request:
    branches:
      - main

jobs:
  verificar:
    name: Instalar e Verificar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        # Descarrega o código do repositório para a máquina virtual

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # cache: 'npm' guarda as dependências para ser mais rápido

      - name: Instalar dependências
        run: npm ci
        # npm ci é mais rigoroso que npm install — usa o package-lock.json exacto

      - name: Correr testes
        run: npm test -- --passWithNoTests || true
        # --passWithNoTests evita que falhe se não houver testes ainda
        # || true garante que o pipeline não para mesmo com erro

  build-apk:
    name: Gerar APK com EAS
    runs-on: ubuntu-latest
    needs: verificar
    # needs: verificar — só corre se o job anterior passou
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Só gera APK quando há push para main

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Login no Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # EXPO_TOKEN é uma variável secreta guardada no GitHub
          # Vais configurar isto no passo seguinte

      - name: Build APK Android
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # --platform android = gera para Android
          # --profile preview = usa o perfil preview do eas.json (APK directo)
          # --non-interactive = não faz perguntas (modo automático)